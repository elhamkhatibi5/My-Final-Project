<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pocket Classroom — Offline</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-gradient sticky-top">
  <div class="container">
    <a class="navbar-brand" href="#">Pocket Classroom</a>
    <div class="ms-auto">
      <button id="themeToggle" class="btn btn-sm btn-outline-light me-2" title="Toggle theme">Theme</button>
      <button id="newCapsuleBtn" class="btn btn-sm btn-success">New Capsule</button>
      <input id="importInput" type="file" accept=".json" class="d-none">
      <button id="importBtn" class="btn btn-sm btn-outline-light">Import JSON</button>
    </div>
  </div>
</nav>

<main class="container py-4">
  <section id="libraryView" class="view">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Library</h2>
      <small id="capsulesCount" class="text-muted"></small>
    </div>
    <div id="capsuleGrid" class="row g-3"></div>
    <div id="emptyLibrary" class="text-center text-muted mt-5 d-none">
      <p class="lead">No capsules yet. Click "New Capsule" to create one or import a JSON.</p>
    </div>
  </section>

  <section id="authorView" class="view d-none">
    <div class="mb-3 d-flex justify-content-between align-items-center">
      <h2 id="authorTitle">Author</h2>
      <div>
        <button id="authorSaveBtn" class="btn btn-primary">Save Capsule</button>
        <button id="authorCancelBtn" class="btn btn-outline-light">Cancel</button>
      </div>
    </div>

    <form id="authorForm" class="needs-validation" novalidate>
      <div class="row">
        <div class="col-md-4">
          <div class="card bg-secondary text-light mb-3">
            <div class="card-body">
              <div class="mb-2">
                <label class="form-label">Title <span class="text-danger">*</span></label>
                <input id="metaTitle" class="form-control" required>
                <div class="invalid-feedback">Title is required.</div>
              </div>
              <div class="mb-2">
                <label class="form-label">Subject</label>
                <input id="metaSubject" class="form-control">
              </div>
              <div class="mb-2">
                <label class="form-label">Level</label>
                <select id="metaLevel" class="form-select">
                  <option>Beginner</option>
                  <option>Intermediate</option>
                  <option>Advanced</option>
                </select>
              </div>
              <div class="mb-2">
                <label class="form-label">Description</label>
                <textarea id="metaDesc" class="form-control" rows="3"></textarea>
              </div>
              <div class="text-muted small">Auto-saves while editing.</div>
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card bg-secondary text-light mb-3">
            <div class="card-body">
              <h5>Notes</h5>
              <textarea id="notesArea" class="form-control mb-3" rows="6" placeholder="One note per line or Markdown-lite"></textarea>

              <h5 class="mt-3">Flashcards</h5>
              <div id="flashcardsList" class="mb-2"></div>
              <div class="mb-3">
                <button id="addFlashcardBtn" type="button" class="btn btn-sm btn-outline-light">Add Flashcard</button>
              </div>

              <h5 class="mt-3">Quiz</h5>
              <div id="quizList" class="mb-2"></div>
              <div>
                <button id="addQuestionBtn" type="button" class="btn btn-sm btn-outline-light">Add Question</button>
              </div>

            </div>
          </div>
        </div>
      </div>
    </form>
  </section>

  <section id="learnView" class="view d-none">
    <div class="mb-3 d-flex justify-content-between align-items-center">
      <h2 id="learnTitle">Learn</h2>
      <div>
        <select id="capsuleSelector" class="form-select form-select-sm"></select>
      </div>
    </div>

    <div class="card bg-secondary text-light">
      <div class="card-body">
        <ul class="nav nav-tabs mb-3" id="learnTabs" role="tablist">
          <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-tab="notes">Notes</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-tab="flashcards">Flashcards</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-tab="quiz">Quiz</button></li>
        </ul>

        <div id="notesPanel" class="learn-panel">
          <div class="mb-2 d-flex">
            <input id="notesSearch" class="form-control me-2" placeholder="Search notes...">
            <button id="exportBtn" class="btn btn-sm btn-outline-light">Export JSON</button>
          </div>
          <div id="notesRender" class="list-group"></div>
        </div>

        <div id="flashcardsPanel" class="learn-panel d-none">
          <div class="text-center mb-3">
            <div id="flashcardBox" class="flashcard mx-auto"></div>
            <div class="mt-2">
              <button id="prevCard" class="btn btn-sm btn-outline-light me-1">Prev</button>
              <button id="flipCard" class="btn btn-sm btn-light text-dark me-1">Flip (Space)</button>
              <button id="nextCard" class="btn btn-sm btn-outline-light">Next</button>
            </div>
            <div class="mt-2">
              <button id="markKnown" class="btn btn-sm btn-success me-1">Known</button>
              <button id="markUnknown" class="btn btn-sm btn-outline-light">Unknown</button>
            </div>
            <div class="mt-2 text-muted small" id="fcCounters"></div>
          </div>
        </div>

        <div id="quizPanel" class="learn-panel d-none">
          <div id="quizArea"></div>
          <div class="mt-3" id="quizResult" style="display:none;"></div>
        </div>

      </div>
    </div>

  </section>

</main>

<footer class="text-center text-muted py-3">
  Pocket Classroom — offline • Export/Import JSON • LocalStorage
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
