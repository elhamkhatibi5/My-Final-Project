<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Classroom</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Pocket Classroom</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" href="#" data-target="library">Library</a></li>
          <li class="nav-item"><a class="nav-link" href="#" data-target="author">Author</a></li>
          <li class="nav-item"><a class="nav-link" href="#" data-target="learn">Learn</a></li>
        </ul>
        <button class="btn btn-outline-light" id="themeToggle">Toggle Theme</button>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <div id="library" class="app-section"></div>
    <div id="author" class="app-section d-none"></div>
    <div id="learn" class="app-section d-none"></div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
