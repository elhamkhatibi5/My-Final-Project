<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pocket Classroom</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">📚 Pocket Classroom</a>
      <div class="ms-auto">
        <button id="themeToggle" class="btn btn-outline-light btn-sm">
          <i class="bi bi-moon"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Tabs -->
  <ul class="nav nav-tabs px-3 mt-2" id="mainTabs">
    <li class="nav-item"><a class="nav-link active" data-bs-target="#library" href="#">Library</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-target="#author" href="#">Author</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-target="#learn" href="#">Learn</a></li>
  </ul>

  <!-- Root container -->
  <main class="container py-3">
    <div id="app"></div>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- App scripts -->
  <script type="module" src="js/main.js"></script>
</body>
</html>    </div>

    <div class="card bg-secondary text-light">
      <div class="card-body">
        <ul class="nav nav-tabs mb-3" id="learnTabs" role="tablist">
          <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-tab="notes">Notes</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-tab="flashcards">Flashcards</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-tab="quiz">Quiz</button></li>
        </ul>

        <div id="notesPanel" class="learn-panel">
          <div class="mb-2 d-flex">
            <input id="notesSearch" class="form-control me-2" placeholder="Search notes...">
            <button id="exportBtn" class="btn btn-sm btn-outline-light">Export JSON</button>
          </div>
          <div id="notesRender" class="list-group"></div>
        </div>

        <div id="flashcardsPanel" class="learn-panel d-none">
          <div class="text-center mb-3">
            <div id="flashcardBox" class="flashcard mx-auto"></div>
            <div class="mt-2">
              <button id="prevCard" class="btn btn-sm btn-outline-light me-1">Prev</button>
              <button id="flipCard" class="btn btn-sm btn-light text-dark me-1">Flip (Space)</button>
              <button id="nextCard" class="btn btn-sm btn-outline-light">Next</button>
            </div>
            <div class="mt-2">
              <button id="markKnown" class="btn btn-sm btn-success me-1">Known</button>
              <button id="markUnknown" class="btn btn-sm btn-outline-light">Unknown</button>
            </div>
            <div class="mt-2 text-muted small" id="fcCounters"></div>
          </div>
        </div>

        <div id="quizPanel" class="learn-panel d-none">
          <div id="quizArea"></div>
          <div class="mt-3" id="quizResult" style="display:none;"></div>
        </div>

      </div>
    </div>

  </section>

</main>

<footer class="text-center text-muted py-3">
  Pocket Classroom — offline • Export/Import JSON • LocalStorage
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
